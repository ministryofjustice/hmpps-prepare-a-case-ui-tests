name: Lint check

on:
  pull_request:
    branches: ["**"]
    paths:
      - '**.java'
      - '**.feature'
      - 'pom.xml'
      - 'checkstyle.xml'
      - '.gherkin-lintrc'
      - '.gitleaks.toml'

permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: lint-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Checkstyle + PMD + Gherkin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Credential/secret scanning — fail fast if secrets are found
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -sSf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm gitleaks.tar.gz
          gitleaks version

      - name: Check for leaked credentials
        run: gitleaks detect --source . --verbose --redact

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # Run the Maven tests
      - name: Run Cucumber Tests
        run: mvn clean verify --no-transfer-progress

      # Publish the report as an artifact
      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-html-report
        # Static analysis — code quality + security patterns
#      - name: Run Checkstyle and PMD
#        run: ./mvnw -T 1C checkstyle:check pmd:check --no-transfer-progress

        # Lint the test cases using Gherkin Lint
#      - name: Run Gherkin Lint
#        run: npx gherkin-lint src/test/java/org/pacfs/test/features/
