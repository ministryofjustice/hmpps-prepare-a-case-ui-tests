name: Lint check

on:
  pull_request:
    branches: ["**"]
    paths:
      - '**.java'
      - '**.feature'
      - 'pom.xml'
      - 'checkstyle.xml'
      - '.gherkin-lintrc'
      - '.gitleaks.toml'

permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: lint-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Checkstyle + PMD + Gherkin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Credential/secret scanning — fail fast if secrets are found
      - name: Check for leaked credentials
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

        # Static analysis — code quality + security patterns
      - name: Run Checkstyle and PMD
        run: ./mvnw -T 1C checkstyle:check pmd:check --no-transfer-progress

        # Lint the test cases using Gherkin Lint
      - name: Run Gherkin Lint
        run: npx gherkin-lint src/test/java/org/pacfs/test/features/
