name: Lint check

on:
  pull_request:
    branches: ["**"]
    paths:
      - '**'

permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: lint-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Leak detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Credential/secret scanning — fail fast if secrets are found
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -sSf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm gitleaks.tar.gz
          gitleaks version

      - name: Check for leaked credentials
        run: gitleaks detect --source . --verbose --redact
