name: Regression Tests

on:
  # Run at 8:30am UTC time, Monday to Friday
  schedule:
    - cron: '30 8 * * 1-5'
      # GitHub added support for timezones in May 2026, but tooling is throwing errors.
    # timezone: "Europe/London"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment URL (leave blank to use default)'
        required: false
        type: string

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UI test repository
        uses: actions/checkout@v4
        with:
          repository: ministryofjustice/hmpps-prepare-a-case-ui-tests
          ref: main

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Ensure PAC_AUT_URL is reachable
        env:
          PAC_AUT_URL: ${{ github.event.inputs.environment || secrets.PAC_AUT_URL }}
        run: |
          if [ -z "$PAC_AUT_URL" ]; then
            echo "PAC_AUT_URL is not set."
            exit 1
          fi

          curl --silent --show-error --fail --location \
            --connect-timeout 10 --max-time 30 \
            "$PAC_AUT_URL" >/dev/null

      - name: Run UI tests
        env:
          PAC_AUT_URL: ${{ github.event.inputs.environment || secrets.PAC_AUT_URL }}
          PAC_USERNAME: ${{ secrets.PAC_USERNAME }}
          PAC_PASSWORD: ${{ secrets.PAC_PASSWORD }}
          PAC_BROWSER_TYPE: "Headless"
          PAC_ENVIRONMENT_TYPE: "local"
          PAC_SELENIUM_GRID: ${{ secrets.PAC_SELENIUM_GRID }}
        run: |
          ./mvnw clean verify -Dcucumber.filter.tags="@test" --no-transfer-progress

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-html-report/
          retention-days: 30

      - name: Upload Surefire report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/surefire-reports/
          retention-days: 30

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          
          curl -X POST "$SLACK_WEBHOOK_URL" \
           -H "Content-type: application/json" \
           --data "{
            \"text\": \"PACFS Cucumber Tests: ${STATUS}\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }"
